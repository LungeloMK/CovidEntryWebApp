<html>
    <head>
        <title>COVID-19 Entry Check Page</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
        <h1>XYZ Institution Entry Check</h1>
        <p>
            Please confirm the following
        </p>
        
        <form action="EntryCheckServlet.do" method="POST">
            <label>
                <input type="checkbox" name="mask" value="yes"  >
                I am wearing the face mask.
            </label>
            <br>
            <label>
                <input type="checkbox" name="sanitize" value="yes" >
                I have sanitized my hands.
            </label>
              <br>
              
              <label>
                  Temperature (°C):
                  <input type="text" name="temperature" placeholder="e.g., 36.5" required="">
              </label> 
              <br>
              
              <input type="submit" value="Check Entry">
              
        </form>
    </body>
</html>
